<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Success - Vick's Shop</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0fdf4; }
        .box { background: white; padding: 50px; border-radius: 20px; text-align: center; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); border: 2px solid #bcf0da; }
        .checkmark { font-size: 70px; color: #22c55e; line-height: 1; }
        h1 { color: #166534; margin: 20px 0 10px; }
        p { color: #475569; margin-bottom: 30px; }
        .home-btn { background: #1eb53a; color: white; text-decoration: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <div class="checkmark">✔</div>
        <h1>Payment Successful!</h1>
        <p>Your order for Vick's items is being processed.</p>
        <a href="/" class="home-btn">Shop More</a>
    </div>
</body>
</html>
