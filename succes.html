<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Vick's Shop</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #e8f5e9; }
        .box { background: white; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .icon { font-size: 50px; color: #2e7d32; }
        h1 { color: #2e7d32; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #1eb53a; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">✔</div>
        <h1>Payment Successful!</h1>
        <p>Your order is now being processed.</p>
        <a href="/" class="btn">Return to Shop</a>
    </div>
</body>
</html>
