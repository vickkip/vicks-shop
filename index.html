<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vick's M-Pesa Store</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .product-grid { display: flex; flex-wrap: wrap; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 10px; margin: 10px; width: 200px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { background: #1eb53a; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Vick's M-Pesa Shop</h1>
    <div id="product-list" class="product-grid">Loading...</div>

    <script>
        const API = 'https://vicks-shop.onrender.com/api';

        async function load() {
            const res = await fetch(`${API}/products`);
            const products = await res.json();
            document.getElementById('product-list').innerHTML = products.map(p => `
                <div class="card">
                    <h3>${p.name}</h3>
                    <p>KES ${p.price}</p>
                    <button onclick="pay('${p.price}')">Pay with M-Pesa</button>
                </div>
            `).join('');
        }

        async function pay(price) {
            const phone = prompt("Enter Safaricom Number (e.g. 0712345678):");
            if (!phone) return;

            const res = await fetch(`${API}/mpesa/push`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, amount: price })
            });

            if (res.ok) {
                alert("✅ STK Push Sent! Check your phone for the PIN prompt.");
            } else {
                alert("❌ Payment request failed. Check your Render logs.");
            }
        }
        load();
    </script>
</body>
</html>
