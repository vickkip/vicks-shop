<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eldoret Computer Technologies</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f8fafc; padding: 20px; color: #1e293b; }
        .header { background: #1e293b; color: white; padding: 30px; border-radius: 12px; margin-bottom: 40px; }
        .product-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; width: 260px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 6px solid #2563eb; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .price { color: #16a34a; font-size: 1.4rem; font-weight: bold; margin: 15px 0; }
        button { background: #1eb53a; color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; font-size: 1rem; }
        button:hover { background: #15803d; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Eldoret Computer Technologies</h1>
        <p>Leading Tech Solutions in Eldoret</p>
    </div>

    <div id="product-list" class="product-grid">Loading Inventory...</div>

    <script>
        async function load() {
            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                document.getElementById('product-list').innerHTML = products.map(p => `
                    <div class="card">
                        <h3>${p.name}</h3>
                        <p class="price">KES ${p.price}</p>
                        <button onclick="pay('${p.price}')">Buy Now (M-Pesa)</button>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('product-list').innerHTML = "Database disconnected.";
            }
        }

        async function pay(price) {
            const phone = prompt("Enter Safaricom Number (e.g. 0712345678):");
            if (!phone) return;
            const res = await fetch('/api/mpesa/push', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone, amount: price })
            });
            if (res.ok) {
                alert("✅ Request Sent! Check your phone for the M-Pesa PIN prompt.");
                window.location.href = "/success";
            } else {
                alert("❌ Request failed. Try again.");
            }
        }
        load();
    </script>
</body>
</html>
