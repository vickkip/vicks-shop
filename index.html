<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vick's Shop</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .product-card { border: 1px solid #ddd; padding: 10px; margin: 10px; display: inline-block; }
    </style>
</head>
<body>
    <h1>Welcome to Vick's Shop</h1>
    <div id="product-list">Loading products...</div>

    <script>
        // REPLACE THE URL BELOW WITH YOUR ACTUAL RENDER URL
        const API = 'https://vicks-shop.onrender.com/api';

        async function fetchProducts() {
            try {
                const response = await fetch(`${API}/products`);
                const data = await response.json();
                const list = document.getElementById('product-list');
                
                if (data.length === 0) {
                    list.innerHTML = "No products found in database.";
                    return;
                }

                list.innerHTML = data.map(p => `
                    <div class="product-card">
                        <h3>${p.name}</h3>
                        <p>${p.description}</p>
                        <p><strong>$${p.price}</strong></p>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('product-list').innerHTML = "Error connecting to server.";
                console.error(err);
            }
        }

        fetchProducts();
    </script>
</body>
</html>
